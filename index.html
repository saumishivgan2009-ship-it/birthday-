<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>His Journey 💗</title>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #ffe0ec, #fff5f9);
    font-family: Arial, "Segoe UI Emoji", sans-serif;
    text-align: center;
}

h1 {
    margin-top: 30px;
    color: #ff4d88;
}

.slideshow {
    position: relative;
    max-width: 350px;
    margin: 40px auto;
}

.slide {
    display: none;
    animation: fade 1.5s ease-in-out;
}

.slide img {
    width: 100%;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.caption {
    margin-top: 15px;
    font-size: 18px;
    color: #444;
}

@keyframes fade {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>

<body>

<h1>From Childhood To Now 🧸✨</h1>

<div class="slideshow">

    <div class="slide">
        <img src="photo1.jpg">
        <div class="caption">The cutest little baby 🧸💗</div>
    </div>

    <div class="slide">
        <img src="photo2.jpg">
        <div class="caption">Growing up with innocence 🌻</div>
    </div>

    <div class="slide">
        <img src="photo3.jpg">
        <div class="caption">Becoming stronger each year 💪✨</div>
    </div>

    <div class="slide">
        <img src="photo4.jpg">
        <div class="caption">The amazing person you are today 🧿🎉</div>
    </div>

</div>

<script>
let slideIndex = 0;
showSlides();

function showSlides() {
    let slides = document.getElementsByClassName("slide");

    for (let i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
    }

    slideIndex++;
    if (slideIndex > slides.length) {
        slideIndex = 1;
    }

    slides[slideIndex - 1].style.display = "block";

    setTimeout(showSlides, 3000);
}
</script>

</body>
</html>
